<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Todo Card</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    <article data-testid="test-todo-card" aria-labelledby="todo-title">
      <div class="card-header">
        <div class="text-block">
          <h2 data-testid="test-todo-title" id="todo-title">Onboarding Flow</h2>
          <p data-testid="test-todo-description">
            Update new user Onboarding screen to show latest brand update.
          </p>
        </div>
        <div class="checkbox-wrapper">
          <label
            for="todo-complete"
            class="checkbox-label"
            aria-label="Mark task as complete"
          >
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              id="todo-complete"
              onchange="handleToggle(this)"
            />
          </label>
        </div>
      </div>
      <div class="badges">
        <span
          data-testid="test-todo-priority"
          class="badge badge-red"
          aria-label="Priority-High"
          >High</span
        >
        <span
          id="status-badge"
          data-testid="test-todo-status"
          aria-label="Status: In Progress"
          class="badge badge-blue"
          >In Progress</span
        >
      </div>

      <div class="dates">
        <time datetime="2026-04-20T18:00:00Z" data-testid="test-todo-due-date">
          <span class="due-label"> Due </span> Apr 20, 2026</time
        >
        <br />
        <time
          id="time-remaining"
          data-testid="test-todo-time-remaining"
          datetime="2026-04-20T18:00:00Z"
          aria-live="polite"
          >Calculating...</time
        >
      </div>

      <ul role="list" data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>
      <div class="actions">
        <button
          data-testid="test-todo-edit-button"
          onclick="
            console.log('edit clicked');
            alert('Edit clicked');
          "
          aria-label="Edit task"
          class="btn btn-edit"
        >
          <img src="/images/pen_10337458.png" alt="edit-pen" class="w-4 h-4" />
          Edit
        </button>
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          class="btn btn-delete"
          onclick="
            console.log('delete clicked');
            alert('Delete clicked');
          "
        >
          <img src="/images/delete_14133943.png" alt="delete" class="w-4 h-4" />
          Delete
        </button>
      </div>
    </article>
    <script src="/index.js"></script>
  </body>
</html>
